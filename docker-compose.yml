services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres-local}
    volumes:
      - techpro-pgdata:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TechPro: Host=postgres;Port=5432;Database=techpro;Username=techpro_app;Password=techpro_dev
      Jwt__Key: ${JWT_KEY:-chave-local-de-desenvolvimento-nao-usar-em-producao-64-bytes!!}
      Jwt__Issuer: TechPro
      Jwt__Audience: TechPro
      Cors__FrontendOrigin: http://localhost:3000
    ports:
      - "5080:8080"

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      # node_modules fica num volume próprio: binários nativos de Linux não
      # podem se misturar com os instalados no host Windows.
      - techpro-node-modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5080
    ports:
      - "3000:3000"

volumes:
  techpro-pgdata:
  techpro-node-modules:
