services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres-local}
    volumes:
      - techpro-pgdata:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TechPro: Host=postgres;Port=5432;Database=techpro;Username=techpro_app;Password=techpro_dev
      Jwt__Key: ${JWT_KEY:-chave-local-de-desenvolvimento-nao-usar-em-producao-64-bytes!!}
      Jwt__Issuer: TechPro
      Jwt__Audience: TechPro
      Cors__FrontendOrigin: http://localhost:3000
    ports:
      - "5080:8080"

volumes:
  techpro-pgdata:
